<section id="contact" class="section contact">

  <div class="container contact-grid">

    <div class="contact-copy">

      <p class="eyebrow">
        Contact & Directions
      </p>

      <h2 class="section-title">
        Find us on Google Maps
      </h2>

      <p class="section-subtitle">
        Open the venue in one tap to see the route, nearby landmarks, and the best way to arrive.
      </p>

      <div class="details">

        <div class="detail-card">

          <span class="detail-label">Venue</span>

          <strong>{{ venueName }}</strong>

        </div>

        <div class="detail-card">

          <span class="detail-label">Address</span>

          <strong>{{ venueAddress }}</strong>

        </div>

      </div>

      <div class="actions">

        <a
          class="btn map-btn"
          [href]="mapsSearchUrl"
          target="_blank"
          rel="noreferrer">

          Open in Google Maps

        </a>

        <a
          class="btn secondary"
          [href]="directionsUrl"
          target="_blank"
          rel="noreferrer">

          Get Directions

        </a>

      </div>

    </div>

    <div class="map-card">

      <iframe
        [src]="mapEmbedUrl"
        title="Wedding venue map"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>

    </div>

  </div>

</section>
