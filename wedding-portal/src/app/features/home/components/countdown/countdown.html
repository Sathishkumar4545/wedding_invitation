<section id="countdown" class="countdown">

  <div class="container">

    <h2>Our Big Day</h2>

    <div class="countdown-grid">

      <div class="count-card">
        <span>{{ days() }}</span>
        <small>Days</small>
      </div>

      <div class="count-card">
        <span>{{ hours() }}</span>
        <small>Hours</small>
      </div>

      <div class="count-card">
        <span>{{ minutes() }}</span>
        <small>Minutes</small>
      </div>

      <div class="count-card">
        <span>{{ seconds() }}</span>
        <small>Seconds</small>
      </div>

    </div>

  </div>

</section>
